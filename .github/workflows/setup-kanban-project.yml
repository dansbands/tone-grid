name: Setup Kanban Project

on:
  workflow_dispatch:

jobs:
  setup-project:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
    steps:
      - name: Create project and add issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Create a new ProjectV2 on the user account
            const createProject = await github.graphql(`
              mutation($ownerId: ID!, $title: String!) {
                createProjectV2(input: { ownerId: $ownerId, title: $title }) {
                  projectV2 { id number url }
                }
              }
            `, {
              ownerId: (await github.graphql(`query($login: String!) {
                user(login: $login) { id }
              }`, { login: owner })).user.id,
              title: "tone-grid"
            });

            const project = createProject.createProjectV2.projectV2;
            console.log(`Created project: ${project.url}`);

            // 2. Fetch the default Status field and its option IDs
            const fieldsResult = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId: project.id });

            const statusField = fieldsResult.node.fields.nodes.find(f => f.name === "Status");
            const todoOption    = statusField?.options.find(o => o.name === "Todo");
            const inProgOption  = statusField?.options.find(o => o.name === "In Progress");
            const doneOption    = statusField?.options.find(o => o.name === "Done");

            console.log("Status field:", statusField?.id);
            console.log("Options:", todoOption?.id, inProgOption?.id, doneOption?.id);

            // 3. Fetch all open issues from the repo
            const issuesResult = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100
            });

            console.log(`Found ${issuesResult.length} open issues`);

            // 4. Add each issue to the project
            for (const issue of issuesResult) {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item { id }
                  }
                }
              `, {
                projectId: project.id,
                contentId: issue.node_id
              });

              const itemId = addResult.addProjectV2ItemById.item.id;
              console.log(`Added issue #${issue.number} as item ${itemId}`);

              // Set status to Todo by default
              if (statusField && todoOption) {
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item { id }
                    }
                  }
                `, {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: todoOption.id
                });
              }
            }

            console.log(`Done! Project URL: ${project.url}`);
