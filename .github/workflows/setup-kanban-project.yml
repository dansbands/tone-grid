name: Setup Kanban Project

# Runs on any push to this PR branch so the board is created immediately,
# again when merged to main, and can be triggered manually at any time.
# Uses GITHUB_TOKEN with projects:write — no extra secret needed.
on:
  push:
    branches: [main, "copilot/**"]
  workflow_dispatch:

jobs:
  setup-project:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      projects: write
    steps:
      - name: Create project and add all open issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const title = "tone-grid";

            // ── 1. Resolve the owner's node ID ───────────────────────────────
            const ownerData = await github.graphql(`
              query($login: String!) {
                user(login: $login) { id }
              }
            `, { login: owner });
            const ownerId = ownerData.user.id;

            // ── 2. Skip if the project already exists ────────────────────────
            const existing = await github.graphql(`
              query($login: String!) {
                user(login: $login) {
                  projectsV2(first: 50) { nodes { id title url } }
                }
              }
            `, { login: owner });
            let project = existing.user.projectsV2.nodes.find(p => p.title === title);

            if (project) {
              console.log(`Project already exists: ${project.url}`);
            } else {
              // ── 3. Create the project ───────────────────────────────────────
              const created = await github.graphql(`
                mutation($ownerId: ID!, $title: String!) {
                  createProjectV2(input: { ownerId: $ownerId, title: $title }) {
                    projectV2 { id number url }
                  }
                }
              `, { ownerId, title });
              project = created.createProjectV2.projectV2;
              console.log(`Created project: ${project.url}`);
            }

            // ── 4. Discover the Status field and its option IDs ──────────────
            const fieldsResult = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId: project.id });

            const statusField = fieldsResult.node.fields.nodes.find(f => f.name === "Status");
            const todoOption  = statusField?.options.find(o => o.name === "Todo");

            // ── 5. Add every open issue (idempotent – duplicates are ignored) ─
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100
            });
            console.log(`Adding ${issues.length} open issues…`);

            for (const issue of issues) {
              const addResult = await github.graphql(`
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                    item { id }
                  }
                }
              `, { projectId: project.id, contentId: issue.node_id });

              const itemId = addResult.addProjectV2ItemById.item.id;
              console.log(`  ✓ issue #${issue.number} → item ${itemId}`);

              if (statusField && todoOption) {
                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId,
                      itemId: $itemId,
                      fieldId: $fieldId,
                      value: { singleSelectOptionId: $optionId }
                    }) { projectV2Item { id } }
                  }
                `, {
                  projectId: project.id,
                  itemId,
                  fieldId: statusField.id,
                  optionId: todoOption.id
                });
              }
            }

            console.log(`\nDone! Board: ${project.url}`);
