name: Setup Kanban Project

# Runs on any push to this PR branch so the board is created immediately,
# again when merged to main, and can be triggered manually at any time.
# Uses GITHUB_TOKEN — no extra secret or PAT needed.
on:
  push:
    branches: [main, "copilot/**"]
  workflow_dispatch:

jobs:
  setup-project:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    steps:
      - name: Create kanban board and populate with open issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const name  = "tone-grid";

            // ── 1. Skip creation if the board already exists ─────────────────
            const { data: existing } = await github.rest.projects.listForRepo({
              owner, repo, state: "open"
            });
            let project = existing.find(p => p.name === name);

            if (project) {
              console.log(`Board already exists: ${project.html_url}`);
            } else {
              const { data: created } = await github.rest.projects.createForRepo({
                owner, repo, name, body: "Kanban board for tone-grid issues"
              });
              project = created;
              console.log(`Created board: ${project.html_url}`);
            }

            // ── 2. Ensure the three kanban columns exist ─────────────────────
            const { data: existingCols } = await github.rest.projects.listColumns({
              project_id: project.id
            });
            const columns = {};
            for (const colName of ["Todo", "In Progress", "Done"]) {
              let col = existingCols.find(c => c.name === colName);
              if (!col) {
                const { data: newCol } = await github.rest.projects.createColumn({
                  project_id: project.id, name: colName
                });
                col = newCol;
                console.log(`Created column: ${colName}`);
              }
              columns[colName] = col;
            }

            // ── 3. Collect issues already on the board ───────────────────────
            const { data: cards } = await github.rest.projects.listCards({
              column_id: columns["Todo"].id
            });
            const onBoard = new Set(cards.map(c => c.content_url).filter(Boolean));

            // ── 4. Add every open issue to the Todo column ───────────────────
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100
            });
            console.log(`Found ${issues.length} open issues`);

            for (const issue of issues) {
              if (onBoard.has(issue.url)) {
                console.log(`  ↷ #${issue.number} already on board`);
                continue;
              }
              await github.rest.projects.createCard({
                column_id: columns["Todo"].id,
                content_id: issue.id,
                content_type: "Issue"
              });
              console.log(`  ✓ #${issue.number} added to Todo`);
            }

            console.log(`\nDone! Board: ${project.html_url}`);
