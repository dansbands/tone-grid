name: Add Issue to Kanban Project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      projects: write
    steps:
      - name: Add issue to project
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;

            // Find the tone-grid project
            const projectsResult = await github.graphql(`
              query($login: String!) {
                user(login: $login) {
                  projectsV2(first: 50) {
                    nodes { id title }
                  }
                }
              }
            `, { login: owner });

            const project = projectsResult.user.projectsV2.nodes.find(p => p.title === "tone-grid");
            if (!project) {
              core.warning("tone-grid project not found. Merge the setup PR to create it.");
              return;
            }

            // Add the new issue to the project
            await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `, {
              projectId: project.id,
              contentId: context.payload.issue.node_id
            });

            console.log(`Added issue #${context.payload.issue.number} to project "${project.title}"`);
