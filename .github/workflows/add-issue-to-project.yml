name: Add Issue to Kanban Project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      repository-projects: write
    steps:
      - name: Add issue to Todo column
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Find the tone-grid board
            const { data: projects } = await github.rest.projects.listForRepo({
              owner, repo, state: "open"
            });
            const project = projects.find(p => p.name === "tone-grid");
            if (!project) {
              core.warning("tone-grid board not found. Merge the setup PR to create it.");
              return;
            }

            // Find the Todo column
            const { data: columns } = await github.rest.projects.listColumns({
              project_id: project.id
            });
            const todoCol = columns.find(c => c.name === "Todo");
            if (!todoCol) {
              core.warning("Todo column not found on the tone-grid board.");
              return;
            }

            // Add the new issue
            await github.rest.projects.createCard({
              column_id: todoCol.id,
              content_id: context.payload.issue.id,
              content_type: "Issue"
            });
            console.log(`Added issue #${context.payload.issue.number} to Todo`);
